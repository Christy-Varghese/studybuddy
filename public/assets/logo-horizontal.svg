<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Book icon -->
  <g transform="translate(4,6) scale(0.52)">
    <!-- Book pages left -->
    <path d="M0 28 Q0 16 12 14 L38 11 L38 86 L12 89 Q0 91 0 79 Z" fill="#7c6fe0"/>
    <!-- Book pages right -->
    <path d="M42 11 L68 14 Q80 16 80 28 L80 79 Q80 91 68 89 L42 86 Z" fill="#9b8ff5"/>
    <!-- Spine -->
    <line x1="40" y1="11" x2="40" y2="86" stroke="#5a4fcf" stroke-width="1.5"/>
    <!-- Bottom point -->
    <polygon points="40,104 28,86 52,86" fill="#7c6fe0"/>
    <!-- Eyes -->
    <circle cx="24" cy="52" r="4" fill="#1a1a2e"/>
    <circle cx="56" cy="52" r="4" fill="#1a1a2e"/>
    <!-- Smile -->
    <path d="M28 64 Q40 73 52 64" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Star -->
    <polygon points="40,-4 42,3 49,3 44,7 46,14 40,10 34,14 36,7 31,3 38,3"
             fill="#c8b4f8"/>
    <!-- Green dashes -->
    <line x1="20" y1="-1" x2="14" y2="-8" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="-1" x2="66" y2="-8" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <defs>
    <linearGradient id="buddyGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <text x="66" y="43" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Study</text>
  <text x="157" y="43" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="700" fill="url(#buddyGradH)" letter-spacing="-0.5">Buddy</text>
</svg>
