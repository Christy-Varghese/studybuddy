<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyBuddy Card — 560×280</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 560px; height: 280px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* subtle grid dots */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(124,58,237,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  /* accent glow blob */
  .glow {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.35;
  }
  .glow-1 { background: #7c3aed; top: -60px; right: -40px; }
  .glow-2 { background: #06b6d4; bottom: -80px; left: -30px; opacity: 0.2; }

  .card {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 0 48px;
    width: 100%;
  }

  .icon-area {
    flex-shrink: 0;
    width: 90px; height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(124,58,237,0.15);
  }

  .text-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13.5px;
    color: rgba(255,255,255,0.65);
    line-height: 1.45;
    max-width: 340px;
  }

  .pills {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.3px;
  }
  .pill.accent {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.35);
    color: #c4b5fd;
  }

  .badge {
    position: absolute;
    bottom: 16px;
    right: 24px;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="card">
    <div class="icon-area">📚</div>
    <div class="text-area">
      <div class="title">StudyBuddy</div>
      <div class="subtitle">
        Offline AI tutor powered by Gemma 4 — adaptive learning, vision homework help, concept maps & spaced repetition. No internet required.
      </div>
      <div class="pills">
        <span class="pill accent">Gemma 4</span>
        <span class="pill">Offline-First</span>
        <span class="pill">Vision</span>
        <span class="pill">Spaced Repetition</span>
        <span class="pill">PWA</span>
      </div>
    </div>
  </div>

  <div class="badge">FUTURE OF EDUCATION</div>
</body>
</html>
