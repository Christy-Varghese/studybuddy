<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============ CSS Variables & Theme Defaults ============ */
    :root {
      color-scheme: light dark;
    }

    /* Default (intermediate) theme */
    body {
      --primary: #6C63FF;
      --primary-dark: #5A52E0;
      --bg: #F8F7FF;
      --surface: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --bubble-bot-bg: #FFFFFF;
      --accent: #A78BFA;
      --success: #10B981;
      --error: #EF4444;
      --border: #E5E7EB;
      --font-family: 'Inter', sans-serif;
    }

    /* ============ Beginner Theme — Playful classroom ============ */
    [data-theme="beginner"] {
      --primary: #FF6B6B;
      --primary-dark: #E05555;
      --bg: #FFF9F0;
      --surface: #FFFFFF;
      --text-primary: #2D2D2D;
      --text-secondary: #888888;
      --bubble-bot-bg: #FFFFFF;
      --accent: #FFD93D;
      --success: #6BCB77;
      --error: #FF6B6B;
      --border: #FFE0CC;
      --font-family: 'Nunito', sans-serif;
    }

    /* ============ Intermediate Theme — Clean study desk ============ */
    [data-theme="intermediate"] {
      --primary: #6C63FF;
      --primary-dark: #5A52E0;
      --bg: #F8F7FF;
      --surface: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --bubble-bot-bg: #FFFFFF;
      --accent: #A78BFA;
      --success: #10B981;
      --error: #EF4444;
      --border: #E5E7EB;
      --font-family: 'Inter', sans-serif;
    }

    /* ============ Advanced Theme — Research terminal ============ */
    [data-theme="advanced"] {
      --primary: #00D2FF;
      --primary-dark: #00A8CC;
      --bg: #0D1117;
      --surface: #161B22;
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --bubble-bot-bg: #1C2128;
      --accent: #388BFD;
      --success: #3FB950;
      --error: #F85149;
      --border: #30363D;
      --font-family: 'JetBrains Mono', monospace;
    }

    /* ============ Global Reset ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-family);
      font-size: 15px;
      line-height: 1.7;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    [data-theme="advanced"] {
      font-size: 14px;
    }

    /* ============ Animations ============ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shimmer {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes float-up {
      0% { transform: translateY(0) translateX(0); opacity: 1; }
      100% { transform: translateY(-60px) translateX(var(--tx, 0)); opacity: 0; }
    }

    @keyframes blink-cursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes confetti {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx, 100px), var(--ty, 100px)) rotate(720deg); opacity: 0; }
    }

    @keyframes bounce-pop {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    /* ============ Header ============ */
    header {
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    [data-theme="advanced"] header {
      background: var(--surface);
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    [data-theme="advanced"] header h1 {
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    [data-theme="advanced"] header h1::after {
      content: "_";
      animation: blink-cursor 1s infinite;
    }

    [data-theme="beginner"] .emoji-shimmer {
      display: inline-block;
      animation: shimmer 2s infinite;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }

    [data-theme="advanced"] .status-badge {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    [data-theme="advanced"] .status-badge::before {
      content: "[";
    }

    [data-theme="advanced"] .status-badge::after {
      content: "]";
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10B981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    [data-theme="advanced"] .status-dot {
      background: var(--success);
    }

    /* Floating decorative stars for beginner */
    [data-theme="beginner"] .floating-stars {
      position: absolute;
      font-size: 18px;
      pointer-events: none;
      animation: float-up 3s ease-in forwards;
    }

    /* ============ Controls Bar ============ */
    .controls {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      flex-shrink: 0;
      position: sticky;
      top: 60px;
      z-index: 10;
    }

    .controls label {
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      color: var(--text-primary);
    }

    #level {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    [data-theme="beginner"] #level {
      border-color: var(--primary);
      border-width: 2px;
    }

    [data-theme="advanced"] #level {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    #level:hover {
      border-color: var(--primary);
    }

    #level:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
    }

    [data-theme="beginner"] #level:focus {
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.15);
    }

    [data-theme="advanced"] #level:focus {
      border-color: var(--primary);
      box-shadow: none;
    }

    .controls button {
      margin-left: auto;
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    [data-theme="beginner"] .controls button {
      background: var(--accent);
      color: var(--text-primary);
      border-radius: 20px;
      animation: bounce-pop 0.3s ease;
    }

    [data-theme="beginner"] .controls button:hover {
      transform: translateY(-2px);
    }

    [data-theme="advanced"] .controls button {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    [data-theme="advanced"] .controls button:hover {
      background: var(--primary);
      color: var(--bg);
    }

    .controls button:hover {
      background: var(--primary-dark);
    }

    .controls button:active {
      transform: scale(0.98);
    }

    /* ============ Chat Area ============ */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeInUp 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    [data-theme="advanced"] .bubble {
      border-radius: 6px;
      font-size: 14px;
    }

    .user {
      background: var(--primary);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    [data-theme="advanced"] .user {
      background: var(--surface);
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    .user::before {
      display: none;
    }

    [data-theme="advanced"] .user::before {
      content: "> query:";
      display: block;
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: -6px;
    }

    .bot {
      background: var(--bubble-bot-bg);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    [data-theme="beginner"] .bot {
      border-left: 4px solid var(--accent);
      padding-left: 16px;
    }

    [data-theme="intermediate"] .bot {
      border-left: 3px solid var(--primary);
      padding-left: 16px;
    }

    [data-theme="advanced"] .bot {
      background: var(--bubble-bot-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      box-shadow: none;
    }

    .bot-avatar {
      display: none;
      width: 24px;
      height: 24px;
      font-size: 20px;
      margin-right: -8px;
    }

    [data-theme="beginner"] .bot-avatar {
      display: inline-block;
    }

    [data-theme="advanced"] .bot::before {
      content: "$ response:";
      display: block;
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: -6px;
    }

    .thinking {
      font-style: italic;
      color: var(--text-secondary);
      font-size: 13px;
    }

    [data-theme="beginner"] .thinking::before {
      content: "🤔 Hmm, let me think";
    }

    [data-theme="beginner"] .thinking {
      display: none;
    }

    [data-theme="beginner"] .thinking-animated {
      display: block;
    }

    [data-theme="advanced"] .thinking::before {
      content: "$ processing query";
    }

    .thinking::after {
      content: '';
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    [data-theme="advanced"] .thinking::after {
      content: " █";
      animation: blink-cursor 0.7s infinite;
    }

    .bubble-image {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 8px;
    }

    [data-theme="beginner"] .system-msg {
      background: rgba(255, 107, 107, 0.1);
      color: var(--primary);
    }

    [data-theme="advanced"] .system-msg {
      background: transparent;
      color: var(--text-secondary);
    }

    /* ============ Input Area ============ */
    .input-row {
      min-height: 72px;
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
      position: relative;
    }

    .input-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      resize: none;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-primary);
      transition: all 0.2s;
      min-height: 40px;
      max-height: 120px;
    }

    [data-theme="beginner"] #input {
      border-radius: 20px;
      border: 2px solid var(--accent);
    }

    [data-theme="advanced"] #input {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    [data-theme="advanced"] #input::placeholder {
      color: var(--text-secondary);
    }

    #input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
    }

    [data-theme="beginner"] #input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.15);
    }

    [data-theme="advanced"] #input:focus {
      border-color: var(--primary);
      box-shadow: none;
    }

    .button-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #send {
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
    }

    [data-theme="beginner"] #send {
      background: var(--primary);
      border-radius: 20px;
    }

    [data-theme="beginner"] #send:hover {
      animation: bounce-pop 0.4s ease;
    }

    [data-theme="advanced"] #send {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    [data-theme="advanced"] #send:hover {
      background: var(--primary);
      color: var(--bg);
    }

    #send:hover {
      background: var(--primary-dark);
    }

    #send:active {
      transform: scale(0.98);
    }

    #send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .attach-btn {
      padding: 10px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .attach-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .attach-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(108, 99, 255, 0.1);
    }

    [data-theme="beginner"] .attach-btn.active {
      background: rgba(255, 107, 107, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    [data-theme="advanced"] .attach-btn {
      border-color: var(--border);
    }

    [data-theme="advanced"] .attach-btn.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    #imageInput {
      display: none;
    }

    .image-preview {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-family: inherit;
    }

    .image-preview .remove-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    /* ============ Quiz Modal ============ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      animation: slideIn 0.3s ease;
      color: var(--text-primary);
      font-family: inherit;
    }

    [data-theme="advanced"] .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .modal-content h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    [data-theme="advanced"] .modal-content h2 {
      font-size: 14px;
      font-weight: 500;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--text-primary);
    }

    .modal-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-primary);
      transition: all 0.2s;
    }

    [data-theme="advanced"] .modal-field input {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .modal-field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
    }

    [data-theme="beginner"] .modal-field input:focus {
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.15);
    }

    [data-theme="advanced"] .modal-field input:focus {
      border-color: var(--primary);
      box-shadow: none;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .modal-btn.primary {
      background: var(--primary);
      color: white;
    }

    [data-theme="advanced"] .modal-btn.primary {
      background: var(--primary);
      color: var(--bg);
    }

    .modal-btn.primary:hover {
      background: var(--primary-dark);
    }

    .modal-btn.secondary {
      background: var(--border);
      color: var(--text-primary);
    }

    [data-theme="advanced"] .modal-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    [data-theme="advanced"] .modal-btn.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .modal-btn.secondary:hover {
      background: #d1d5db;
    }

    /* ============ Quiz Card ============ */
    .quiz-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      background: var(--surface);
      align-self: flex-start;
      max-width: 100%;
      width: 100%;
      animation: fadeInUp 0.3s ease;
      font-family: inherit;
    }

    [data-theme="advanced"] .quiz-card {
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .quiz-card h2 {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin: -20px -20px 16px -20px;
      font-size: 18px;
      text-align: center;
    }

    [data-theme="beginner"] .quiz-card h2 {
      background: linear-gradient(135deg, #FF6B6B, #FFD93D);
    }

    [data-theme="advanced"] .quiz-card h2 {
      background: transparent;
      color: var(--text-primary);
      padding: 0;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    [data-theme="advanced"] .quiz-card h2::before {
      content: "=== ";
    }

    [data-theme="advanced"] .quiz-card h2::after {
      content: " ===";
    }

    .quiz-question {
      font-weight: 600;
      margin-bottom: 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    [data-theme="advanced"] .quiz-question {
      font-size: 14px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option-btn {
      padding: 12px 16px;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      font-family: inherit;
    }

    [data-theme="beginner"] .option-btn {
      border-radius: 16px;
      border: 2px solid var(--accent);
      font-size: 16px;
    }

    [data-theme="advanced"] .option-btn {
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    [data-theme="advanced"] .option-btn::before {
      content: "[ ] ";
      margin-right: 4px;
      color: var(--border);
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: rgba(108, 99, 255, 0.05);
    }

    [data-theme="beginner"] .option-btn:hover:not(:disabled) {
      background: rgba(255, 107, 107, 0.05);
      transform: translateX(4px);
    }

    [data-theme="advanced"] .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: transparent;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.correct {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    [data-theme="beginner"] .option-btn.correct {
      background: var(--success);
      border-radius: 16px;
    }

    [data-theme="advanced"] .option-btn.correct {
      border-color: var(--success);
      background: transparent;
      color: var(--success);
    }

    [data-theme="advanced"] .option-btn.correct::before {
      content: "[✓] ";
      color: var(--success);
    }

    .option-btn.wrong {
      background: var(--error);
      color: white;
      border-color: var(--error);
    }

    [data-theme="advanced"] .option-btn.wrong {
      border-color: var(--error);
      background: transparent;
      color: var(--error);
    }

    [data-theme="advanced"] .option-btn.wrong::before {
      content: "[✗] ";
      color: var(--error);
    }

    .explanation {
      margin-top: 12px;
      padding: 12px;
      background: rgba(16, 185, 129, 0.1);
      border-left: 3px solid var(--success);
      border-radius: 4px;
      font-size: 14px;
      color: var(--text-primary);
    }

    [data-theme="beginner"] .explanation {
      background: rgba(107, 203, 119, 0.15);
      border-left-color: var(--success);
    }

    [data-theme="advanced"] .explanation {
      background: transparent;
      border-left: 1px solid var(--success);
      border-radius: 0;
      padding: 8px 0 8px 8px;
    }

    .quiz-score {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-weight: 600;
      color: var(--primary);
      font-size: 16px;
    }

    [data-theme="beginner"] .quiz-score {
      font-size: 18px;
    }

    [data-theme="beginner"] .quiz-score::before {
      content: "";
    }

    [data-theme="advanced"] .quiz-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-primary);
    }

    [data-theme="advanced"] .quiz-score::before {
      content: "RESULT: ";
    }

    .star-rating {
      font-size: 24px;
      margin: 8px 0;
      display: none;
    }

    [data-theme="beginner"] .star-rating {
      display: block;
    }

    .quiz-restart {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    [data-theme="beginner"] .quiz-restart {
      border-radius: 20px;
      background: var(--primary);
    }

    [data-theme="advanced"] .quiz-restart {
      border-radius: 6px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
    }

    [data-theme="advanced"] .quiz-restart:hover {
      background: var(--primary);
      color: var(--bg);
    }

    .quiz-restart:hover {
      background: var(--primary-dark);
    }

    .quiz-restart:active {
      transform: scale(0.98);
    }

    /* Confetti animation for perfect quiz score */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      animation: confetti 3s ease-out forwards;
    }

    /* Theme transition */
    body.theme-transitioning {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    body.theme-transitioning.show {
      opacity: 1;
    }

    /* ── Structured response container ── */
    .structured-response {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 78%;
      align-self: flex-start;
    }

    /* ── Intro ── */
    .resp-intro {
      font-size: 14px;
      line-height: 1.65;
      padding: 10px 14px;
      border-radius: 16px 16px 16px 4px;
      background: var(--surface, #fff);
      border: 0.5px solid var(--border, #E5E7EB);
      color: var(--text-primary, #1A1A2E);
    }

    /* ── Step card ── */
    .resp-step {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--surface, #fff);
      border: 0.5px solid var(--border, #E5E7EB);
    }

    .resp-step-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary, #6C63FF);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .resp-step-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .resp-step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary, #1A1A2E);
      line-height: 1.4;
    }

    .resp-step-text {
      font-size: 13px;
      color: var(--text-secondary, #6B7280);
      line-height: 1.6;
    }

    /* Emoji row — sits on its own line with generous spacing */
    .resp-step-emoji {
      font-size: 22px;
      letter-spacing: 5px;
      margin-top: 6px;
      line-height: 1.4;
      display: block;
    }

    /* ── Answer pill ── */
    .resp-answer {
      display: inline-block;
      align-self: flex-start;
      background: var(--success, #10B981);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      padding: 7px 18px;
      line-height: 1.4;
    }

    /* ── Follow-up ── */
    .resp-followup {
      font-size: 12px;
      font-style: italic;
      color: var(--text-secondary, #6B7280);
      background: var(--bg, #F8F7FF);
      border-radius: 10px;
      padding: 8px 12px;
      line-height: 1.5;
    }

    /* ──────────────────────────────────────
       BEGINNER THEME OVERRIDES
       [data-theme="beginner"] on the container
       ────────────────────────────────────── */
    .structured-response[data-theme="beginner"] .resp-intro {
      border-radius: 20px 20px 20px 4px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      padding: 12px 16px;
    }

    .structured-response[data-theme="beginner"] .resp-step {
      border-radius: 16px;
      padding: 12px 16px;
      font-family: 'Nunito', sans-serif;
      border-left: 4px solid var(--accent, #FFD93D);
      border-radius: 0;
    }

    .structured-response[data-theme="beginner"] .resp-step-num {
      background: #FF6B6B;
      width: 28px;
      height: 28px;
      font-size: 13px;
    }

    .structured-response[data-theme="beginner"] .resp-step-title {
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      color: #FF6B6B;
    }

    .structured-response[data-theme="beginner"] .resp-step-text {
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      color: var(--text-primary, #2D2D2D);
    }

    .structured-response[data-theme="beginner"] .resp-step-emoji {
      font-size: 26px;
      letter-spacing: 6px;
      margin-top: 8px;
    }

    .structured-response[data-theme="beginner"] .resp-answer {
      background: #6BCB77;
      color: #1a4a1e;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      padding: 9px 22px;
      border-radius: 24px;
    }

    .structured-response[data-theme="beginner"] .resp-followup {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      border-radius: 14px;
      padding: 10px 14px;
    }

    /* ──────────────────────────────────────
       ADVANCED THEME OVERRIDES
       [data-theme="advanced"] on the container
       ────────────────────────────────────── */
    .structured-response[data-theme="advanced"] .resp-intro {
      background: #1C2128;
      border: 1px solid #30363D;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #E6EDF3;
    }

    .structured-response[data-theme="advanced"] .resp-step {
      background: #1C2128;
      border: 1px solid #30363D;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .structured-response[data-theme="advanced"] .resp-step-num {
      background: transparent;
      border: 1px solid #00D2FF;
      color: #00D2FF;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .structured-response[data-theme="advanced"] .resp-step-title {
      color: #00D2FF;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .structured-response[data-theme="advanced"] .resp-step-text {
      color: #8B949E;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .structured-response[data-theme="advanced"] .resp-answer {
      background: transparent;
      border: 1px solid #3FB950;
      color: #3FB950;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      border-radius: 4px;
      padding: 6px 14px;
    }

    .structured-response[data-theme="advanced"] .resp-followup {
      background: transparent;
      border: none;
      color: #8B949E;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 4px 0;
      font-style: normal;
    }

    /* ── Voice input button ── */
    #mic-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border, #E5E7EB);
      background: transparent;
      color: var(--text-secondary, #6B7280);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      position: relative;
    }

    #mic-btn:hover {
      border-color: var(--primary, #6C63FF);
      color: var(--primary, #6C63FF);
      background: var(--bg, #F8F7FF);
    }

    /* Listening state — button turns red with a pulse ring */
    #mic-btn.listening {
      border-color: #EF4444;
      color: #EF4444;
      background: #FCEBEB;
      animation: mic-pulse 1.2s ease-in-out infinite;
    }

    /* Processing state — button turns amber while transcript finalises */
    #mic-btn.processing {
      border-color: #F59E0B;
      color: #F59E0B;
      background: #FAEEDA;
    }

    /* Pulse ring animation */
    @keyframes mic-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70%  { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    /* Live transcript preview pill — floats above the input area */
    #voice-preview {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface, #fff);
      border: 1px solid var(--border, #E5E7EB);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-secondary, #6B7280);
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    #voice-preview.visible {
      opacity: 1;
    }

    /* Voice status bar — appears above chat input area when listening */
    #voice-status-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 24px;
      background: var(--bg, #F8F7FF);
      border-top: 0.5px solid var(--border, #E5E7EB);
      font-size: 12px;
      color: var(--text-secondary, #6B7280);
    }

    #voice-status-bar.active {
      display: flex;
    }

    /* Animated sound wave bars (5 bars) */
    .voice-wave {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
    }

    .voice-wave span {
      display: inline-block;
      width: 3px;
      border-radius: 2px;
      background: #EF4444;
      animation: wave-bar 0.8s ease-in-out infinite;
    }

    .voice-wave span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .voice-wave span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .voice-wave span:nth-child(3) { height: 8px;  animation-delay: 0.3s; }
    .voice-wave span:nth-child(4) { height: 14px; animation-delay: 0.1s; }
    .voice-wave span:nth-child(5) { height: 5px;  animation-delay: 0.25s; }

    @keyframes wave-bar {
      0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
      50%       { transform: scaleY(1.4); opacity: 1; }
    }

    /* ── Theme overrides for mic button ── */

    /* Beginner: coral red mic, rounded, fun */
    [data-theme="beginner"] #mic-btn {
      border-radius: 14px;
      border-color: #FFD93D;
      color: #FF6B6B;
      font-family: 'Nunito', sans-serif;
    }
    [data-theme="beginner"] #mic-btn.listening {
      background: #FFF3E0;
      border-color: #FF6B6B;
    }

    /* Advanced: terminal style square mic button */
    [data-theme="advanced"] #mic-btn {
      border-radius: 4px;
      border-color: #30363D;
      color: #8B949E;
      font-family: 'JetBrains Mono', monospace;
    }
    [data-theme="advanced"] #mic-btn.listening {
      border-color: #00D2FF;
      color: #00D2FF;
      background: transparent;
      animation: none;
      box-shadow: 0 0 0 1px #00D2FF;
    }
    [data-theme="advanced"] .voice-wave span {
      background: #00D2FF;
    }
    [data-theme="advanced"] #voice-status-bar {
      background: #0D1117;
      border-color: #30363D;
      color: #8B949E;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
  </style>
</head>
<body data-theme="intermediate">
  <!-- ============ Screen Reader Announcer ============ -->
  <div
    id="sr-announcer"
    aria-live="polite"
    aria-atomic="true"
    style="position:absolute; width:1px; height:1px; overflow:hidden;
           clip:rect(0,0,0,0); white-space:nowrap;"
  ></div>

  <!-- ============ Header ============ -->
  <header>
    <h1>📚 StudyBuddy</h1>
    <div class="status-badge">
      <span class="status-dot"></span>
      Local AI
    </div>
  </header>

  <!-- ============ Controls Bar ============ -->
  <div class="controls">
    <label for="level">My level:</label>
    <select id="level">
      <option value="beginner">Beginner (age 8–12)</option>
      <option value="intermediate" selected>Intermediate (high school)</option>
      <option value="advanced">Advanced (university+)</option>
    </select>
    <button id="quizBtn" onclick="openQuizModal()">📝 Quiz Me</button>
    <button id="agent-toggle" onclick="toggleAgentMode()" style="background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s ease;">
      Agent mode: OFF
    </button>
    <button id="progress-btn" onclick="showProgress()" style="background: transparent; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-left: 8px; transition: all 0.2s ease;">
      📊 My Progress
    </button>
  </div>

  <!-- ============ Chat Area ============ -->
  <div id="chat">
    <div class="bubble bot">👋 Hi! I'm StudyBuddy. Ask me anything — a concept, a problem, or snap a photo of your homework!</div>
  </div>

  <!-- ============ Voice Status Bar ============ -->
  <div id="voice-status-bar">
    <div class="voice-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span id="voice-status-text">Listening... speak your question</span>
    <button
      onclick="stopVoice()"
      style="margin-left:auto; font-size:12px; color:#EF4444;
             background:none; border:none; cursor:pointer; padding:0;"
    >
      Stop
    </button>
  </div>

  <!-- ============ Input Area ============ -->
  <div class="input-row">
    <div class="input-container">
      <div id="imagePreviewContainer"></div>
      <textarea id="input" rows="2" placeholder="Ask a question... e.g. What is gravity?"></textarea>
    </div>
    <div class="button-group">
      <button
        id="mic-btn"
        onclick="toggleVoice()"
        title="Speak your question"
        aria-label="Voice input"
      >
        <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9"  y1="22" x2="15" y2="22"/>
        </svg>
        <div id="voice-preview"></div>
      </button>
      <button class="attach-btn" id="attachBtn" onclick="triggerImageUpload()" title="Attach image">📎</button>
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- ============ Hidden Image Input ============ -->
  <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelected()">

  <!-- ============ Quiz Modal ============ -->
  <div class="modal-overlay" id="quizModal" onclick="closeQuizModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2>Create a Quiz</h2>

      <div class="modal-field">
        <label for="quizTopic">Topic</label>
        <input type="text" id="quizTopic" placeholder="e.g. Photosynthesis, World War II, Algebra">
      </div>

      <div class="modal-field">
        <label for="quizCount">Number of Questions</label>
        <input type="number" id="quizCount" min="3" max="10" value="5">
      </div>

      <div class="modal-buttons">
        <button class="modal-btn secondary" onclick="closeQuizModal()">Cancel</button>
        <button class="modal-btn primary" onclick="generateQuiz()">Generate Quiz</button>
      </div>
    </div>
  </div>

  <script>
    // ============ State Variables ============
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const levelEl = document.getElementById('level');
    const attachBtn = document.getElementById('attachBtn');
    const imageInput = document.getElementById('imageInput');
    const quizModal = document.getElementById('quizModal');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');

    let history = [];
    let pendingImage = null;
    let currentQuiz = null;
    let quizAnswers = {};
    let agentMode = false;

    // ============ Message Bubble Helper ============
    function addBubble(content, role, isHTML = false) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      if (isHTML) {
        div.innerHTML = content;
      } else {
        div.textContent = content;
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    // ============ Image Upload Handlers ============
    function triggerImageUpload() {
      imageInput.click();
    }

    function handleImageSelected() {
      const file = imageInput.files[0];
      if (!file) return;

      // Validate file type and size
      if (!file.type.startsWith('image/')) {
        alert('Please select an image file');
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        alert('Image must be smaller than 10MB');
        return;
      }

      pendingImage = file;
      attachBtn.classList.add('active');
      renderImagePreview();
    }

    function renderImagePreview() {
      imagePreviewContainer.innerHTML = '';

      if (!pendingImage) {
        attachBtn.classList.remove('active');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const container = document.createElement('div');
        container.className = 'image-preview';
        container.innerHTML = `
          <img src="${e.target.result}" alt="Preview">
          <button class="remove-btn" onclick="removeImage()">✕</button>
        `;
        imagePreviewContainer.appendChild(container);
      };
      reader.readAsDataURL(pendingImage);
    }

    function removeImage() {
      pendingImage = null;
      imageInput.value = '';
      renderImagePreview();
      attachBtn.classList.remove('active');
    }

    // ============ Send Message Handler ============
    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message && !pendingImage) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      // Show user message with optional image
      let userBubbleHTML = '';
      if (pendingImage) {
        const reader = new FileReader();
        reader.onload = (e) => {
          userBubbleHTML = `<img src="${e.target.result}" alt="Homework" class="bubble-image">${message}`;
          const userBubble = addBubble(userBubbleHTML, 'user', true);
        };
        reader.readAsDataURL(pendingImage);
      } else {
        addBubble(message, 'user');
      }

      const thinkingBubble = addBubble('Thinking...', 'thinking');
      thinkingBubble.remove();

      if (agentMode) {
        await sendToAgent(message);
      } else {
        await sendToChat(message);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    async function sendToChat(message) {
      // Existing chat logic
      let estimateBadge = null;
      let countdownInterval = null;
      try {
        const estimateRes = await fetch('/estimate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            level: levelEl.value,
            hasImage: !!pendingImage
          })
        });

        if (estimateRes.ok) {
          const estimate = await estimateRes.json();
          const { badge, interval } = showEstimateBadge(estimate);
          estimateBadge = badge;
          countdownInterval = interval;
        }
      } catch (e) {
        // Silently fail estimate - it's optional
      }

      try {
        if (pendingImage) {
          // Use /chat-with-image endpoint
          const formData = new FormData();
          formData.append('message', message);
          formData.append('level', levelEl.value);
          formData.append('history', JSON.stringify(history));
          formData.append('image', pendingImage);

          const res = await fetch('/chat-with-image', {
            method: 'POST',
            body: formData
          });

          const data = await res.json();
          if (estimateBadge) estimateBadge.remove();
          if (countdownInterval) clearInterval(countdownInterval);

          if (data.error) {
            addBubble('⚠️ ' + data.error, 'bot');
          } else {
            renderBotResponse(data);
            history.push({ role: 'user', content: message });
            history.push({ role: 'assistant', content: data.reply });
          }

          pendingImage = null;
          removeImage();
        } else {
          // Use /chat endpoint
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message,
              level: levelEl.value,
              history
            })
          });

          const data = await res.json();
          if (estimateBadge) estimateBadge.remove();
          if (countdownInterval) clearInterval(countdownInterval);

          if (data.error) {
            addBubble('⚠️ ' + data.error, 'bot');
          } else {
            renderBotResponse(data);
            history.push({ role: 'user', content: message });
            history.push({ role: 'assistant', content: data.reply });
          }
        }
      } catch (e) {
        if (estimateBadge) estimateBadge.remove();
        if (countdownInterval) clearInterval(countdownInterval);
        addBubble('⚠️ Could not reach the server.', 'bot');
      }
    }

    // ============ Quiz Modal Handlers ============
    function openQuizModal() {
      quizModal.classList.add('active');
      document.getElementById('quizTopic').focus();
    }

    function closeQuizModal(event) {
      if (event && event.target !== quizModal) return;
      quizModal.classList.remove('active');
    }

    async function generateQuiz() {
      const topic = document.getElementById('quizTopic').value.trim();
      const numQuestions = parseInt(document.getElementById('quizCount').value, 10);

      if (!topic) {
        alert('Please enter a topic');
        return;
      }

      const generateBtn = event.target;
      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';

      try {
        const res = await fetch('/quiz', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic,
            level: levelEl.value,
            numQuestions
          })
        });

        const data = await res.json();

        if (data.error) {
          alert('⚠️ ' + data.error);
        } else {
          currentQuiz = data.questions;
          quizAnswers = {};
          closeQuizModal();
          renderQuizCard();
        }
      } catch (e) {
        alert('⚠️ Could not generate quiz. Is Ollama running?');
      }

      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Quiz';
    }

    // ============ Quiz Rendering ============
    function renderQuizCard() {
      if (!currentQuiz || currentQuiz.length === 0) return;

      let quizHTML = `<div class="quiz-card">`;

      currentQuiz.forEach((q, idx) => {
        const qNum = idx + 1;
        quizHTML += `
          <div style="margin-bottom: 24px;">
            <div class="quiz-question">${qNum}. ${q.question}</div>
            <div class="quiz-options">
        `;

        q.options.forEach((option, optIdx) => {
          const answered = quizAnswers[idx] !== undefined;
          const isCorrect = option === q.answer;
          const wasSelected = quizAnswers[idx] === option;

          let btnClass = 'option-btn';
          if (answered) {
            if (isCorrect) btnClass += ' correct';
            else if (wasSelected && !isCorrect) btnClass += ' wrong';
          }

          quizHTML += `
            <button 
              class="${btnClass}" 
              onclick="selectAnswer(${idx}, '${option.replace(/'/g, "&#39;")}')"
              ${answered ? 'disabled' : ''}
            >
              ${option}
            </button>
          `;
        });

        quizHTML += `</div>`;

        // Show explanation if answered
        if (quizAnswers[idx] !== undefined) {
          quizHTML += `<div class="explanation">✓ ${q.explanation}</div>`;
        }

        quizHTML += `</div>`;
      });

      // Score tracker
      const score = Object.keys(quizAnswers).filter(
        idx => currentQuiz[idx].answer === quizAnswers[idx]
      ).length;
      const total = currentQuiz.length;

      quizHTML += `<div class="quiz-score">Score: ${score} / ${total}</div>`;

      // Restart button (if all answered)
      if (Object.keys(quizAnswers).length === total) {
        quizHTML += `
          <button class="quiz-restart" onclick="restartQuiz()">Restart Quiz</button>
        `;
      }

      quizHTML += `</div>`;

      // Clear existing quiz if any
      const existingQuiz = chatEl.querySelector('.quiz-card');
      if (existingQuiz) existingQuiz.remove();

      addBubble(quizHTML, 'bot', true);
    }

    function selectAnswer(questionIdx, option) {
      quizAnswers[questionIdx] = option;
      renderQuizCard();
    }

    function restartQuiz() {
      currentQuiz = null;
      quizAnswers = {};
      const quizCard = chatEl.querySelector('.quiz-card');
      if (quizCard) {
        quizCard.closest('.bubble').remove();
      }
      openQuizModal();
    }

    // ============ Theme Switching ============
    function applyTheme(theme) {
      document.body.classList.add('theme-transitioning');
      setTimeout(() => {
        document.body.setAttribute('data-theme', theme);
        document.body.classList.remove('theme-transitioning');
      }, 150);

      // Show system message based on theme
      const messages = {
        beginner: "🎉 Great choice! Let's explore in a fun, colorful way!",
        intermediate: "📖 Nice! Ready to dive deeper into the concepts?",
        advanced: "⚡ Excellent! Time to explore advanced topics."
      };
      
      const bubble = addBubble(messages[theme], 'system');
      bubble.classList.add('system-msg');

    function showEstimateBadge(estimate) {
      const badge = document.createElement('div');
      badge.className = 'estimate-badge';
      badge.innerHTML = `
        <div class="estimate-value">${estimate.label}</div>
        <div class="estimate-complexity">${estimate.complexity}</div>
      `;
      chatEl.appendChild(badge);

      let remaining = estimate.seconds;
      const interval = setInterval(() => {
        remaining--;
        const valueDiv = badge.querySelector('.estimate-value');
        if (valueDiv) {
          valueDiv.textContent = remaining > 0 ? `${remaining}s` : '⏱ Processing...';
        }
        
        if (remaining <= 0) {
          clearInterval(interval);
        }
      }, 1000);

      return { badge, interval };
    }

    // ============ Structured Response Rendering ============
    function renderBotResponse(data) {
      // If structured JSON is available, render it as cards
      if (data.structured && data.structured.steps) {
        renderStructuredResponse(data.structured);
      } else {
        // Fallback: render as plain text bubble (existing behaviour)
        // Strip any raw markdown bold/italic before displaying
        const cleaned = (data.reply || '')
          .replace(/\*\*(.*?)\*\*/g, '$1')   // remove **bold**
          .replace(/\*(.*?)\*/g, '$1')        // remove *italic*
          .trim();
        addBubble(cleaned, 'bot');
      }
    }

    function renderStructuredResponse(s) {
      const theme = document.body.getAttribute('data-theme') || 'intermediate';
      const container = document.createElement('div');
      container.className = 'structured-response';
      container.setAttribute('data-theme', theme);
      container.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 78%;
        align-self: flex-start;
        animation: fadeInUp 0.3s ease forwards;
      `;

      // 1. INTRO card
      if (s.intro) {
        const introEl = document.createElement('div');
        introEl.className = 'resp-intro';
        introEl.textContent = s.intro;
        container.appendChild(introEl);
      }

      // 2. STEP cards
      if (s.steps && s.steps.length > 0) {
        s.steps.forEach((step, i) => {
          const stepEl = document.createElement('div');
          stepEl.className = 'resp-step';

          const numEl = document.createElement('div');
          numEl.className = 'resp-step-num';
          numEl.textContent = i + 1;

          const bodyEl = document.createElement('div');
          bodyEl.className = 'resp-step-body';

          const titleEl = document.createElement('div');
          titleEl.className = 'resp-step-title';
          titleEl.textContent = step.title;

          const textEl = document.createElement('div');
          textEl.className = 'resp-step-text';
          textEl.textContent = step.text;

          bodyEl.appendChild(titleEl);
          bodyEl.appendChild(textEl);

          // Emoji row — only shown if field is non-empty (beginner mode)
          if (step.emoji && step.emoji.trim() !== '') {
            const emojiEl = document.createElement('div');
            emojiEl.className = 'resp-step-emoji';
            emojiEl.textContent = step.emoji;
            bodyEl.appendChild(emojiEl);
          }

          stepEl.appendChild(numEl);
          stepEl.appendChild(bodyEl);
          container.appendChild(stepEl);
        });
      }

      // 3. ANSWER pill/card
      if (s.answer) {
        const answerEl = document.createElement('div');
        answerEl.className = 'resp-answer';
        answerEl.textContent = s.answer;
        container.appendChild(answerEl);
      }

      // 4. FOLLOW-UP note
      if (s.followup) {
        const followupEl = document.createElement('div');
        followupEl.className = 'resp-followup';
        followupEl.textContent = s.followup;
        container.appendChild(followupEl);
      }

      chatEl.appendChild(container);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendToAgent(message) {
      // Show estimate first
      let estimateBadge = null;
      let countdownInterval = null;
      try {
        const estimateRes = await fetch('/estimate', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, level: levelEl.value, hasImage: false })
        });
        if (estimateRes.ok) {
          const estimate = await estimateRes.json();
          const { badge, interval } = showEstimateBadge(estimate);
          estimateBadge = badge;
          countdownInterval = interval;
        }
      } catch (e) {
        // Silently fail estimate
      }

      try {
        const res = await fetch('/agent', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            level:   levelEl.value,
            history: history.slice(-6)   // last 3 turns only — keep context manageable
          })
        });

        const data = await res.json();
        if (estimateBadge) estimateBadge.remove();
        if (countdownInterval) clearInterval(countdownInterval);

        if (!data.success && !data.structured) {
          addBubble('⚠️ Agent could not complete the request. Try again.', 'bot');
          return;
        }

        // Show tools-used badge row
        if (data.toolCallLog && data.toolCallLog.length > 0) {
          renderToolBadges(data.toolCallLog);
        }

        // Render the structured agent response
        if (data.structured) {
          renderAgentResponse(data.structured);
        } else {
          addBubble(data.rawReply, 'bot');
        }

        // Add to history
        history.push({ role: 'user',      content: message });
        history.push({ role: 'assistant', content: data.rawReply });

      } catch (err) {
        if (estimateBadge) estimateBadge.remove();
        if (countdownInterval) clearInterval(countdownInterval);
        addBubble('⚠️ Agent error: could not reach server.', 'bot');
      }
    }

    // ============ Event Listeners ============
    levelEl.addEventListener('change', (e) => {

    });

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {

      }
    });

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {

      }
    });

    // ── Voice Input Feature ──
    const SILENCE_MS = 1800;
    let recognition = null;
    let isListening = false;
    let voiceTranscript = '';
    let silenceTimer = null;

    // Initialize Web Speech API
    try {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        // Set default language
        const defaultLang = getVoiceLanguage();
        recognition.lang = defaultLang;
        
        console.log('[Voice] Web Speech API initialized with language:', defaultLang);

        recognition.onstart = () => {
          isListening = true;
          voiceTranscript = '';
          setMicState('listening');
          const theme = document.documentElement.getAttribute('data-theme');
          const statusMsg = theme === 'beginner' ? '🎤 Listening...' : 'Listening...';
          document.getElementById('voice-status-text').textContent = statusMsg;
          console.log('[Voice] Recognition started, listening...');
          announceToScreenReader('Voice input started, listening for your question');
        };

        recognition.onresult = (event) => {
          let interim = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              voiceTranscript += transcript + ' ';
              console.log('[Voice] Final result:', transcript);
            } else {
              interim += transcript;
              console.log('[Voice] Interim result:', transcript);
            }
          }
          // Show live preview in the floating pill
          const preview = voiceTranscript + interim;
          updateVoicePreview(preview);
          // Restart silence timer on each result
          clearTimeout(silenceTimer);
          silenceTimer = setTimeout(finaliseVoiceInput, SILENCE_MS);
          console.log('[Voice] Silence timer set for', SILENCE_MS, 'ms');
        };

        recognition.onend = () => {
          isListening = false;
          clearTimeout(silenceTimer);
          console.log('[Voice] Recognition ended');
        };

        recognition.onerror = (event) => {
          console.warn('[Voice] Recognition error:', event.error);
          console.warn('[Voice] Error details - code:', event.error);
          
          let errorMessage = '';
          let screenReaderMsg = '';
          
          if (event.error === 'no-speech') {
            errorMessage = 'No speech detected. Please speak clearly and try again.';
            screenReaderMsg = 'No speech detected, please try again';
          } else if (event.error === 'network') {
            errorMessage = 'Network error. Retrying connection...';
            screenReaderMsg = 'Network error. Checking connection and retrying...';
            // Retry after a short delay
            console.log('[Voice] Network error detected. Will retry in 500ms...');
            setTimeout(() => {
              if (isListening && recognition) {
                console.log('[Voice] Retrying recognition after network error');
                try {
                  recognition.start();
                } catch (e) {
                  console.error('[Voice] Retry failed:', e);
                }
              }
            }, 500);
            announceToScreenReader(screenReaderMsg);
            return; // Don't stop yet, we're retrying
          } else if (event.error === 'audio-capture') {
            errorMessage = 'Microphone not available. Please check your device.';
            screenReaderMsg = 'Microphone not found or permission denied';
          } else if (event.error === 'not-allowed') {
            errorMessage = 'Microphone permission denied. Please enable in browser settings.';
            screenReaderMsg = 'Microphone permission not granted';
          } else if (event.error === 'service-not-allowed') {
            errorMessage = 'Voice input not available in your region.';
            screenReaderMsg = 'Voice input service not available';
          } else {
            errorMessage = `Voice error: ${event.error}`;
            screenReaderMsg = `Voice recognition error: ${event.error}`;
          }
          
          if (screenReaderMsg && event.error !== 'network') {
            announceToScreenReader(screenReaderMsg);
          }
          
          // Show error message if present
          if (errorMessage && event.error !== 'network') {
            console.error('[Voice]', errorMessage);
            const statusText = document.getElementById('voice-status-text');
            if (statusText) {
              statusText.textContent = errorMessage;
              statusText.style.color = 'var(--error, #EF4444)';
            }
            // Keep the error visible for a moment before resetting
            setTimeout(() => {
              setMicState('idle');
              hideVoiceStatusBar();
            }, 2000);
          } else if (event.error !== 'network') {
            setMicState('idle');
            hideVoiceStatusBar();
          }
        };
      } else {
        // Web Speech API not supported — hide mic button
        const micBtn = document.getElementById('mic-btn');
        if (micBtn) micBtn.style.display = 'none';
      }
    } catch (e) {
      console.error('Voice API init error:', e);
      const micBtn = document.getElementById('mic-btn');
      if (micBtn) micBtn.style.display = 'none';
    }

    function startVoice() {
      if (!recognition) return;
      try {
        voiceTranscript = '';
        const lang = getVoiceLanguage();
        recognition.lang = lang;
        console.log('[Voice] Starting recognition with language:', lang);
        recognition.start();
      } catch (e) {
        console.warn('[Voice] Voice start error:', e);
        // If there's an error, try again after a short delay
        setTimeout(() => {
          try {
            console.log('[Voice] Retrying recognition start after error');
            recognition.start();
          } catch (e2) {
            console.error('[Voice] Retry failed:', e2);
            setMicState('idle');
          }
        }, 300);
      }
    }

    function stopVoice() {
      if (!recognition || !isListening) return;
      try {
        recognition.stop();
        clearTimeout(silenceTimer);
      } catch (e) {
        console.warn('Voice stop error:', e);
      }
    }

    function toggleVoice() {
      if (isListening) {
        stopVoice();
        setMicState('idle');
        hideVoiceStatusBar();
        hideVoicePreview();
      } else {
        startVoice();
      }
    }

    function finaliseVoiceInput() {
      if (!isListening) return;
      isListening = false;
      recognition.stop();
      setMicState('processing');
      const finalText = voiceTranscript.trim();
      console.log('[Voice] Finalising input with text:', finalText);
      if (finalText) {
        // Get the textarea and set its value
        const inputElement = document.getElementById('input');
        if (inputElement) {
          inputElement.value = finalText;
          console.log('[Voice] Text set in input element');
          updateVoicePreview(finalText);
          // Auto-send after a brief delay so UI updates are visible
          setTimeout(() => {
            console.log('[Voice] Attempting to send message...');
            try {
              // Call sendMessage - it should be available at this point
              sendMessage();
              console.log('[Voice] sendMessage() called successfully');
            } catch (e) {
              console.error('[Voice] Error calling sendMessage:', e);
              // Fallback: trigger send button click
              const sendBtn = document.getElementById('send');
              console.log('[Voice] Trying fallback: clicking send button');
              if (sendBtn) {
                sendBtn.click();
              }
            }
            // Reset voice state after message is sent
            setTimeout(() => {
              voiceTranscript = '';
              hideVoicePreview();
              setMicState('idle');
              console.log('[Voice] State reset to idle');
            }, 200);
          }, 200);
        }
      } else {
        announceToScreenReader('No speech was recognized');
        setMicState('idle');
        hideVoiceStatusBar();
      }
    }

    function setMicState(state) {
      const micBtn = document.getElementById('mic-btn');
      if (!micBtn) return;
      micBtn.classList.remove('listening', 'processing');
      if (state === 'listening') {
        micBtn.classList.add('listening');
        document.getElementById('voice-status-bar').classList.add('active');
      } else if (state === 'processing') {
        micBtn.classList.add('processing');
      } else {
        document.getElementById('voice-status-bar').classList.remove('active');
      }
    }

    function updateVoicePreview(text) {
      const preview = document.getElementById('voice-preview');
      if (!preview) return;
      preview.textContent = text || '';
      preview.classList.add('visible');
    }

    function hideVoicePreview() {
      const preview = document.getElementById('voice-preview');
      if (preview) {
        preview.classList.remove('visible');
      }
    }

    function hideVoiceStatusBar() {
      const bar = document.getElementById('voice-status-bar');
      if (bar) {
        bar.classList.remove('active');
      }
    }

    function getVoiceLanguage() {
      const levelEl = document.getElementById('level');
      // Default to en-US; could extend with more logic later
      return 'en-US';
    }

    function announceToScreenReader(message) {
      const announcer = document.getElementById('sr-announcer');
      if (announcer) {
        announcer.textContent = message;
      }
    }

    // Keyboard shortcut: Ctrl+Shift+V to toggle voice input
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.code === 'KeyV') {
        e.preventDefault();
        toggleVoice();
      }
    });

    // Show voice shortcut hint (desktop only)
    if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
      const controlsBar = document.querySelector('[class*="controls"]') || document.querySelector('.chat-header');
      if (controlsBar && recognition) {
        const hint = document.createElement('span');
        hint.textContent = ' • Ctrl+Shift+V: Voice';
        hint.style.fontSize = '12px';
        hint.style.color = 'var(--text-secondary, #6B7280)';
        hint.style.marginLeft = '8px';
        controlsBar.appendChild(hint);
      }
    }

    // Clean up voice state - reset after message is processed
    // Simple cleanup without wrapping sendMessage
  </script>
</body>
</html>
